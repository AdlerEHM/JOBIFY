<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobify - Login</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="login-screen">
    <div class="login-card">
        <h1 class="logo-main">JOBIFY</h1>

        <!-- Mensaje de error compartido -->
        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <!-- ── PANTALLA 2FA ── -->
        <div id="form2FA" style="display:none; text-align:center; padding:8px 0;">
            <div style="font-size:52px; margin-bottom:12px;">🛡️</div>
            <h2 style="font-size:20px; font-weight:800; color:var(--text-main); margin:0 0 6px;">
                Verificación en dos pasos
            </h2>
            <p style="font-size:13px; color:var(--text-muted); margin:0 0 28px; line-height:1.5;">
                Enviamos un código de 6 dígitos a<br>
                <strong id="correo2FA" style="color:var(--primary);"></strong>
            </p>
            <div class="input-group">
                <label>Código de verificación</label>
                <input type="text" id="codigo2FA" placeholder="000000"
                    maxlength="6"
                    style="font-size:28px; text-align:center; letter-spacing:10px; font-weight:700; padding:14px;">
            </div>
            <button id="btnVerificar2FA" class="btn-main" style="margin-top:12px;">
                ✅ Verificar e ingresar
            </button>
            <button id="btnReenviar2FA"
                style="display:block; width:100%; background:none; border:none;
                       color:var(--primary); font-size:13px; font-weight:600;
                       cursor:pointer; margin-top:14px; padding:8px; font-family:inherit;">
                ¿No recibiste el código? Reenviar
            </button>
        </div>

        <!-- ── FORMULARIO NORMAL ── -->
        <div id="formLogin">
            <div class="tabs-header">
                <button id="btnTabLogin" class="tab-link active">Iniciar Sesión</button>
                <button id="btnTabRegister" class="tab-link">Registrarse</button>
            </div>

            <div class="form-content" id="formContent">
                <div class="column-inputs">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                    </div>

                    <button id="btnSubmit" class="btn-main">Iniciar Sesión</button>

                    <div class="separator">ó</div>

                    <button id="btnGoogle" class="btn-google">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="18">
                        Continuar con Google
                    </button>
                </div>

                <!-- Selección de rol (solo en registro) -->
                <div class="column-roles" id="roleSelection" style="display:none;">
                    <p style="font-size:13px; color:#666; margin-bottom:12px; font-weight:600;">¿Cómo usarás Jobify?</p>
                    <div class="role-card" id="roleEmpresa">
                        <div class="role-icon">🏢</div>
                        <span>Empresa</span>
                        <small>Publico proyectos</small>
                    </div>
                    <div class="role-card" id="roleProgramador">
                        <div class="role-icon">💻</div>
                        <span>Programador</span>
                        <small>Busco proyectos</small>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <a href="#" id="btnRecover" class="link-footer">¿Olvidaste tu contraseña?</a>
                <div class="status-2fa">
                    <span>🛡️</span> Conexión segura
                </div>
            </div>
        </div><!-- /formLogin -->

    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
