<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobify - Valoración</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="valoracion.css">
    <link rel="stylesheet" href="navbar.css">
</head>
<body>

    <header class="top-bar">
        <button class="btn-back" onclick="window.location.href='misproyectos.html'">← Mis Proyectos</button>
        <h2 class="logo-text">JOBIFY</h2>
        <div class="user-actions">
            <span id="roleBadge" class="role-badge">...</span>
            <div class="notif-wrapper">
                <button class="notif-bell" id="notifBell">🔔
                    <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
                </button>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-header">
                        <h4>Notificaciones</h4>
                        <button class="btn-marcar-todas" id="btnMarcarTodas">✓ Marcar todas</button>
                    </div>
                    <div class="notif-lista" id="notifLista"></div>
                </div>
            </div>
            <div class="profile-container-nav">
                <div class="profile-trigger" id="profileTrigger">
                    <img id="userPhoto" src="" alt="" style="display:none;">
                    <div id="userInitial">?</div>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="dropdown-header">
                        <div class="large-profile-circle" id="menuInitial">?</div>
                        <h4 id="menuName">Usuario</h4>
                        <p id="menuEmail">correo@ejemplo.com</p>
                        <div class="menu-reputacion" id="menuReputacion"></div>
                    </div>
                    <div class="dropdown-body">
                        <button onclick="window.location.href='perfil.html'" class="btn-menu">⚙️ Editar Perfil</button>
                        <button onclick="window.location.href='misproyectos.html'" class="btn-menu" style="margin-top:6px;">📁 Mis Proyectos</button>
                    </div>
                    <div class="dropdown-footer">
                        <button id="btnLogout" class="btn-logout-dropdown"> Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Cargando valoración...</p>
    </div>

    <main id="mainContent" class="valorar-layout" style="display:none;">
        <div id="valorarContenido"></div>
    </main>

    <script type="module" src="valoracion-page.js"></script>
    <script type="module">
        import { iniciarNavbar } from "./navbar.js";
        iniciarNavbar();
    </script>
</body>
</html>
